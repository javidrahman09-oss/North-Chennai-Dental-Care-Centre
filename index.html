<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>North Chennai Dental Care Centre | Premium Dental Care</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* CSS Reset and Variables */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --navy: #0a1628;
    --navy2: #0e1e38;
    --navy3: #162848;
    --gold: #c9a84c;
    --gold2: #e8c86a;
    --white: #ffffff;
    --muted: #a8b4c8;
    --light-bg: #e0f2f1; /* Adjust to match mockup */
    --accent: #ffcc00; /* Adjust to match mockup */
}

body {
    font-family: 'DM Sans', sans-serif;
    background-color: #030a1c; /* Background from mockup */
    color: var(--white);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Global Container */
.container {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    padding: 20px;
}

/* Main Card */
.main-card {
    background: linear-gradient(145deg, var(--navy2), var(--navy3));
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
}

/* Main Card Image Area */
.main-card-image {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #1a3060, #0d1f3d);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

.tooth-svg {
    width: 160px;
    opacity: 0.9;
}

/* Main Card Body */
.main-card-body {
    padding: 30px;
}

.main-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--gold);
}

.main-card-sub {
    font-size: 14px;
    color: var(--muted);
}

/* Floating Elements Positioning */
.float-card {
    position: absolute;
    background: #111a36; /* Specific dark blue for cards */
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    color: white; /* Ensure text is visible */
}

/* Floats relative to .main-card-image */
.float-card-1 {
    top: 15px;
    right: 15px;
    min-width: 160px;
}

.float-card-2 {
    bottom: 15px;
    left: 15px;
    min-width: 180px;
}

.float-icon {
    font-size: 24px;
    margin-bottom: 8px;
}

.float-val {
    font-size: 20px;
    font-weight: 700;
    font-family: 'Playfair Display', serif;
}

.float-label {
    font-size: 11px;
    color: var(--muted);
}

/* Floating Actions positioning */
.floating-actions {
    position: fixed; /* Keep it on top of other content */
    bottom: 30px;
    right: 30px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: flex-end;
}

.btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.btn-contact {
    background-color: var(--navy2);
    color: var(--white);
    padding: 12px 24px;
    border: 1px solid rgba(255,255,255,0.1);
}

.btn-appointment {
    background-color: var(--accent);
    color: var(--navy);
    padding: 12px 24px;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="main-card-image">
            <svg class="tooth-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="100" cy="70" rx="60" ry="50" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.4)" stroke-width="2"/>
                <ellipse cx="70" cy="65" rx="20" ry="16" fill="rgba(201,168,76,0.2)" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
                <ellipse cx="130" cy="65" rx="20" ry="16" fill="rgba(201,168,76,0.2)" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
                <path d="M60 100 Q65 150 80 160 Q90 165 95 150 Q100 135 105 150 Q110 165 120 160 Q135 150 140 100" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.4)" stroke-width="2"/>
                <circle cx="100" cy="68" r="8" fill="rgba(201,168,76,0.3)" stroke="rgba(201,168,76,0.6)" stroke-width="1"/>
                <text x="100" y="188" text-anchor="middle" fill="rgba(201,168,76,0.6)" font-size="11" font-family="DM Sans" letter-spacing="3">DENTAL EXCELLENCE</text>
            </svg>

            <div class="float-card float-card-1">
                <div class="float-icon">🏆</div>
                <div class="float-val">Top Rated</div>
                <div class="float-label">Dental Clinic in Thiruvottiyur</div>
            </div>

            <div class="float-card float-card-2">
                <div class="float-icon">💎</div>
                <div class="float-val">Affordable</div>
                <div class="float-label">Premium care at the best price</div>
            </div>
        </div>

        <div class="main-card-body">
            <div class="main-card-title">North Chennai Dental Care</div>
            <div class="main-card-sub">936 Thiruvottiyur High Rd, Kaladipet, Chennai 600019</div>
        </div>
    </div>
</div>

<div class="floating-actions">
    <a href="tel:07401054157" class="btn btn-contact">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 13a19.79 19.79 0 01-3.07-8.67A2 2 0 012 2.18 3.9 3.9 0 015 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L9.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        074010 54157
    </a>
    <a href="#contact" class="btn btn-appointment">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Book Appointment
    </a>
</div>

</body>
</html>
